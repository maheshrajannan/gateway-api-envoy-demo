# Gateway — owned by the PLATFORM TEAM ("G" in Class -> Gateway -> Routes)
# The front door: listeners, ports, (and TLS in a real setup). No cloud-specific
# fields — Envoy Gateway turns this into a Service under the hood. On a cloud that
# Service becomes a LoadBalancer; on kind you port-forward it. The manifest is identical.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: demo
spec:
  gatewayClassName: eg            # references the GatewayClass above
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same              # only Routes in the 'demo' namespace may attach

# HTTPRoute — owned by the APP TEAM ("R" in Class -> Gateway -> Routes)
# "who goes where": match a host + path, send to my Service. App teams self-serve
# these without touching the Gateway. This object is 100% portable across clouds.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: demo
spec:
  parentRefs:
    - name: eg                    # attach to the platform team's Gateway
  hostnames:
    - "www.example.com"           # match this Host header
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /              # everything under "/"
      backendRefs:
        - name: whoami
          port: 80
